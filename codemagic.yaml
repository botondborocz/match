workflows:
  ios-unsigned-workflow:
    name: Build KMP iOS App (Unsigned)
    instance_type: mac_mini_m2
    max_build_duration: 120

    environment:
      java: 17
      groups:
        - api_keys # ⚠️ Make sure to add your 3 new Google variables to this group in the Codemagic UI!

    scripts:
      - name: Make Gradle Wrapper Executable
        script: chmod +x gradlew

      - name: Inject API Keys into local.properties
        script: |
          # For Google Maps
          echo "MAPS_API_KEY=$MAPS_API_KEY" >> local.properties
          
          # 👇 1. Added these for Kotlin BuildKonfig (GoogleAuthClient files)
          echo "GOOGLE_WEB_CLIENT_ID=$GOOGLE_WEB_CLIENT_ID" >> local.properties
          echo "GOOGLE_IOS_CLIENT_ID=$GOOGLE_IOS_CLIENT_ID" >> local.properties

      - name: Inject Google iOS Keys into Config.xcconfig
        script: |
          # 👇 2. Generate the Config.xcconfig file securely for Xcode (Info.plist)
          # Create the folder if Git ignored it, then write the variables
          mkdir -p iosApp/Configuration
          echo "GOOGLE_IOS_CLIENT_ID = $GOOGLE_IOS_CLIENT_ID" > iosApp/Configuration/Config.xcconfig
          echo "GOOGLE_REVERSED_CLIENT_ID = $GOOGLE_REVERSED_CLIENT_ID" >> iosApp/Configuration/Config.xcconfig

      - name: Configure Gradle Memory limits for 8GB Mac
        script: |
          # This forces Gradle and Kotlin to stay safely inside the 8GB RAM limit!
          echo "" >> gradle.properties 
          echo "org.gradle.jvmargs=-Xmx2g -XX:MaxMetaspaceSize=512m" >> gradle.properties
          echo "kotlin.native.jvmArgs=-Xmx3g" >> gradle.properties
          echo "kotlin.native.cacheKind=none" >> gradle.properties
          echo "org.gradle.daemon=false" >> gradle.properties

      - name: Build Unsigned iOS App
        script: |
          set -e 
          
          # 1. Changed to -configuration Debug
          xcodebuild clean build \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Debug \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CONFIGURATION_BUILD_DIR=build/Debug-iphoneos \
            OTHER_LDFLAGS="-framework MapKit -framework CoreLocation"
          
          # 2. Changed the folder paths to match Debug
          mkdir -p Payload
          mv iosApp/build/Debug-iphoneos/*.app Payload/
          zip -r KmpApp.ipa Payload

    artifacts:
      - KmpApp.ipa