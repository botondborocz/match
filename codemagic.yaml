workflows:
  ios-unsigned-workflow:
    name: Build KMP iOS App (Unsigned)
    instance_type: mac_mini_m2
    max_build_duration: 120

    environment:
      java: 17
      groups:
        - api_keys

    scripts:
      - name: Make Gradle Wrapper Executable
        script: chmod +x gradlew

      - name: Inject API Keys into local.properties
        script: |
          echo "MAPS_API_KEY=$MAPS_API_KEY" >> local.properties
          echo "GOOGLE_WEB_CLIENT_ID=$GOOGLE_WEB_CLIENT_ID" >> local.properties
          echo "GOOGLE_IOS_CLIENT_ID=$GOOGLE_IOS_CLIENT_ID" >> local.properties

      - name: Inject Google Secrets into Info.plist
        script: |
          sed -i '' "s/REPLACE_ME_IOS_CLIENT_ID/$GOOGLE_IOS_CLIENT_ID/g" iosApp/iosApp/Info.plist
          sed -i '' "s/REPLACE_ME_REVERSED_CLIENT_ID/$GOOGLE_REVERSED_CLIENT_ID/g" iosApp/iosApp/Info.plist

      - name: Configure Gradle Memory limits
        script: |
          echo "" >> gradle.properties 
          echo "org.gradle.jvmargs=-Xmx2g -XX:MaxMetaspaceSize=512m" >> gradle.properties
          echo "kotlin.native.jvmArgs=-Xmx3g" >> gradle.properties
          echo "kotlin.native.cacheKind=none" >> gradle.properties
          echo "org.gradle.daemon=false" >> gradle.properties

      - name: Build Unsigned iOS App
        script: |
          set -e 

          # 1. Generate BOTH dummy framework and podspec
          ./gradlew :shared:generateDummyFramework :shared:podspec

          # 2. Install Pods to create the Workspace
          cd iosApp
          pod install
          cd ..

          # 3. Build the Workspace with the Cycle Fix
          # The -parallelizeTargets NO flag prevents the AppAuth crash!
          xcodebuild clean build \
            -workspace iosApp/iosApp.xcworkspace \
            -scheme iosApp \
            -configuration Debug \
            -sdk iphoneos \
            -parallelizeTargets NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

          # 4. Package the IPA
          # Xcode puts the build in a 'DerivedData' or default folder if we don't specify.
          # We'll look for the .app file and move it to Payload.
          mkdir -p Payload
          APP_PATH=$(find . -name "*.app" | grep "Debug-iphoneos" | head -n 1)
          cp -R "$APP_PATH" Payload/
          zip -r KmpApp.ipa Payload

    artifacts:
      - KmpApp.ipa