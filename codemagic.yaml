workflows:
  ios-unsigned-workflow:
    name: Build KMP iOS App (Unsigned)
    instance_type: mac_mini_m2
    max_build_duration: 120

    environment:
      java: 17
      groups:
        - api_keys

    scripts:
      - name: Make Gradle Wrapper Executable
        script: chmod +x gradlew

      - name: Inject API Key into local.properties
        script: echo "MAPS_API_KEY=$MAPS_API_KEY" >> local.properties

      - name: Configure Gradle Memory limits for 8GB Mac
        script: |
          # This forces Gradle and Kotlin to stay safely inside the 8GB RAM limit!
          echo "" >> gradle.properties 
          echo "org.gradle.jvmargs=-Xmx2g -XX:MaxMetaspaceSize=512m" >> gradle.properties
          echo "kotlin.native.jvmArgs=-Xmx3g" >> gradle.properties
          echo "kotlin.native.cacheKind=none" >> gradle.properties
          echo "org.gradle.daemon=false" >> gradle.properties

      - name: Build Unsigned iOS App
        script: |
          # Tells the script to stop immediately if the build fails
          set -e 

          xcodebuild clean build \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CONFIGURATION_BUILD_DIR=build/Release-iphoneos \
            OTHER_LDFLAGS="-framework MapKit -framework CoreLocation"

          mkdir -p Payload
          mv iosApp/build/Release-iphoneos/*.app Payload/
          zip -r KmpApp.ipa Payload

    artifacts:
      - KmpApp.ipa